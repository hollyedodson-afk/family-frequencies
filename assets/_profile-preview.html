<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #888; display: flex; gap: 20px; padding: 20px; }
.item { width: 400px; height: 400px; flex-shrink: 0; }
</style>
</head>
<body>
<!-- Mark only -->
<div class="item">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
    <rect width="400" height="400" fill="#1A2B40"/>
    <!-- Exact logo from design handoff, scaled from 48×48 viewBox to 400×400 -->
    <g transform="scale(8.333) translate(0 0)">
      <circle cx="24" cy="13.5" r="6.5" fill="#F0B840"/>
      <path d="M3 33 C7 25 12 25 16 33 C20 41 28 41 32 33 C36 25 41 25 45 33"
            stroke="#FAF0E0" stroke-width="4" stroke-linecap="round" fill="none"/>
    </g>
  </svg>
</div>
<!-- Mark + wordmark -->
<div class="item">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
    <rect width="400" height="400" fill="#1A2B40"/>
    <!-- Logo scaled and centered, shifted up to make room for wordmark -->
    <g transform="translate(200 115) scale(5.5) translate(-24 -24)">
      <circle cx="24" cy="13.5" r="6.5" fill="#F0B840"/>
      <path d="M3 33 C7 25 12 25 16 33 C20 41 28 41 32 33 C36 25 41 25 45 33"
            stroke="#FAF0E0" stroke-width="4" stroke-linecap="round" fill="none"/>
    </g>
    <text x="200" y="300" text-anchor="middle" font-size="52" fill="#FAF0E0" letter-spacing="3"
          font-family="'Barlow Condensed', Impact, 'Arial Narrow', sans-serif" font-weight="700">FAMILY</text>
    <text x="200" y="356" text-anchor="middle" font-size="40" fill="#F0B840" letter-spacing="2"
          font-family="'Barlow Condensed', Impact, 'Arial Narrow', sans-serif" font-weight="700">FREQUENCIES</text>
  </svg>
</div>
</body>
</html>
